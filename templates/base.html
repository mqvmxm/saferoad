<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeRoad — {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{{ url_for('main.index') }}" class="nav-logo">SafeRoad</a>
      <div class="nav-links">
        <a href="{{ url_for('main.entrevista') }}" class="nav-link {% if request.endpoint == 'main.entrevista' %}active{% endif %}">Entrevista</a>
        <a href="{{ url_for('main.encuesta') }}"   class="nav-link {% if request.endpoint == 'main.encuesta' %}active{% endif %}">Encuesta</a>
        <a href="{{ url_for('main.resultados') }}"  class="nav-link {% if request.endpoint == 'main.resultados' %}active{% endif %}">Resultados</a>
        <a href="{{ url_for('main.exportar') }}" class="btn-export">Exportar CSV</a>
      </div>
    </div>
  </nav>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
